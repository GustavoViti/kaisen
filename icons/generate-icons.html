<!DOCTYPE html>
<html>
<!--
  Abra este arquivo no navegador, clique com botão direito em cada canvas
  e salve como icon-192.png e icon-512.png respectivamente.
-->
<body style="background:#0f0f0f;display:flex;gap:24px;padding:24px;flex-wrap:wrap;font-family:system-ui">
<script>
  function draw(size) {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');

    // Background rounded rect
    const bg = ctx.createLinearGradient(0, 0, size, size);
    bg.addColorStop(0, '#222222');
    bg.addColorStop(1, '#0f0f0f');
    ctx.fillStyle = bg;
    const r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fill();

    // Orange glow halo
    const glow = ctx.createRadialGradient(size * 0.5, size * 0.45, 0, size * 0.5, size * 0.45, size * 0.45);
    glow.addColorStop(0, 'rgba(255,107,0,0.28)');
    glow.addColorStop(1, 'rgba(255,107,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, size, size);

    // Emoji with gradient fill via clip trick
    ctx.font = `bold ${size * 0.52}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚡', size / 2, size / 2 + size * 0.03);

    document.body.appendChild(c);
    const label = document.createElement('p');
    label.style.cssText = 'color:#f5f5f5;text-align:center;font-size:13px;margin-top:6px';
    label.textContent = `${size}×${size} — clique direito → Salvar como icon-${size}.png`;
    document.body.appendChild(label);
  }
  draw(192);
  draw(512);
</script>
</body>
</html>
