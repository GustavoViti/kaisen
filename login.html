<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff6b00" />
  <meta name="description" content="Kaisen – seu dashboard gamificado de hábitos e rotina" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kaisen" />
  <title>Kaisen – Login</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <div class="login-card" id="login-card" hidden>
    <div class="login-logo" aria-hidden="true">🎮</div>
    <h1>Kaisen</h1>
    <p>Transforme seus hábitos em missões.<br>Suba de nível todos os dias.</p>

    <!-- Mensagem de erro inline -->
    <div id="login-error" class="login-error" role="alert" hidden></div>

    <button class="btn-google" id="login-btn">
      <svg class="google-icon" width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span id="login-btn-text">Entrar com Google</span>
      <span class="btn-spinner" id="login-spinner" hidden aria-hidden="true"></span>
    </button>

    <div class="login-divider" aria-hidden="true"><span>ou</span></div>

    <form id="email-login-form" class="login-form" novalidate>
      <label>
        <span>Email</span>
        <input id="login-email" type="email" autocomplete="email" placeholder="seu@email.com" required />
      </label>
      <label>
        <span>Senha</span>
        <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" minlength="6" required />
      </label>
      <button type="submit" class="btn-email btn-google" id="login-email-btn">
        <span id="login-email-btn-text">Entrar com Email</span>
        <span class="btn-spinner" id="login-email-spinner" hidden aria-hidden="true"></span>
      </button>
      <button type="button" class="btn-link" id="toggle-auth-mode">Criar conta</button>
    </form>

    <p class="login-footer">Ao entrar, você concorda com os termos de uso.</p>
  </div>

  <!-- Spinner inicial enquanto verifica sessão -->
  <div id="login-loading" class="login-loading-overlay" aria-label="Verificando sessão">
    <div class="auth-spinner"></div>
  </div>

  <script type="module">
    import { getCurrentUser, loginWithGoogle, loginWithEmailAndPassword, registerWithEmailAndPassword, getAuthErrorMessage } from './js/firebase.js';

    const card            = document.getElementById('login-card');
    const loadingEl       = document.getElementById('login-loading');
    const btn             = document.getElementById('login-btn');
    const btnText         = document.getElementById('login-btn-text');
    const spinner         = document.getElementById('login-spinner');
    const emailInput      = document.getElementById('login-email');
    const passwordInput   = document.getElementById('login-password');
    const emailBtn        = document.getElementById('login-email-btn');
    const emailBtnText    = document.getElementById('login-email-btn-text');
    const emailSpinner    = document.getElementById('login-email-spinner');
    const toggleAuthMode  = document.getElementById('toggle-auth-mode');
    const loginForm       = document.getElementById('email-login-form');
    const errorEl         = document.getElementById('login-error');
    let isRegisterMode    = false;

    // Verifica sessão antes de exibir o formulário
    const authCheckTimeout = setTimeout(() => {
      if (card.hidden) {
        console.warn('Verificação de sessão demorou demais. Exibindo formulário manualmente.');
        loadingEl.remove();
        card.hidden = false;
      }
    }, 3000);

    getCurrentUser()
      .then((user) => {
        clearTimeout(authCheckTimeout);
        if (user) {
          window.location.replace('dashboard.html');
          return;
        }
        // Não há sessão: esconde loading, exibe card
        loadingEl.remove();
        card.hidden = false;
      })
      .catch((err) => {
        clearTimeout(authCheckTimeout);
        console.error('Erro ao verificar sessão de login:', err);
        loadingEl.remove();
        card.hidden = false;
        showError(getAuthErrorMessage(err));
      });

    btn.addEventListener('click', async () => {
      setLoading(true);
      clearError();

      try {
        await loginWithGoogle();
        window.location.replace('dashboard.html');
      } catch (err) {
        console.error('Erro no login com Google:', err);
        // popup fechado pelo usuário não é exibido como erro
        if (err?.code === 'auth/popup-closed-by-user' ||
            err?.code === 'auth/cancelled-popup-request') {
          setLoading(false);
          return;
        }
        showError(getAuthErrorMessage(err));
        setLoading(false);
      }
    });

    toggleAuthMode.addEventListener('click', () => {
      isRegisterMode = !isRegisterMode;
      emailBtnText.textContent = isRegisterMode ? 'Criar conta' : 'Entrar com Email';
      toggleAuthMode.textContent = isRegisterMode ? 'Já tenho conta' : 'Criar conta';
      clearError();
    });

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      setEmailLoading(true);
      clearError();

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        showError('Informe email e senha para continuar.');
        setEmailLoading(false);
        return;
      }

      try {
        if (isRegisterMode) {
          await registerWithEmailAndPassword(email, password);
        } else {
          await loginWithEmailAndPassword(email, password);
        }
        window.location.replace('dashboard.html');
      } catch (err) {
        console.error('Erro no login com email:', err);
        showError(getAuthErrorMessage(err));
        setEmailLoading(false);
      }
    });

    function setLoading(loading) {
      btn.disabled = loading;
      spinner.hidden = !loading;
      btnText.textContent = loading ? 'Entrando...' : 'Entrar com Google';
    }

    function setEmailLoading(loading) {
      emailBtn.disabled = loading;
      emailSpinner.hidden = !loading;
      emailBtnText.textContent = loading
        ? (isRegisterMode ? 'Criando conta...' : 'Entrando...')
        : (isRegisterMode ? 'Criar conta' : 'Entrar com Email');
    }

    function showError(message) {
      errorEl.textContent = message;
      errorEl.hidden = false;
    }

    function clearError() {
      errorEl.textContent = '';
      errorEl.hidden = true;
    }

    // Service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(console.error);
    }
  </script>
</body>
</html>
